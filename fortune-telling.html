<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://fonts.googleapis.com/css2?family=Grandiflora+One&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic&display=swap" rel="stylesheet">
        <title>☘️오늘의 뿡세!</title>
        
    <style>
        body {
            background-color: rgb(239, 255, 240);
            text-align: center;
            font-family: 'Nanum Gothic', sans-serif;
        }
        h1 {
            color: black;
            text-align: center;
            font-family: 'Grandiflora One', cursive;
        }

    </style>

    <body>
        <h1>☘️ 오늘의 뿡세!</h1>
        <br>
        <p>오늘의 뿡세는...</p>
        <br>
        <button onclick="getFortune()">뿡세 뽑기</button>
        <p id="fortune"></p>
       
    </body>

    <script>
        function getFortune() {
            var fortunes = [
                '오하아사가 몇 위든 1위의 행운으로 만들어주는 뿡세🍀',
                '오늘은 예콩이에게 좋은 말을 하세요!😬 예콩이에게 좋은 말을 하면 복이 와용',
                '쾌변을 할 수도?💩',
                '예콩이가 당신을 생각하고 있더영😘',
                '오늘 쇼핑을 하면 득템!?🛍️',
                '물을 많이 마시세요💧',
                '좋아하는 노래를 좋아하는 사람과 같이 들어요!🎧',
                '산책을 가면 좋은 일이 생길지도?🚶‍♀️'
            ]
            var randomIndex = Math.floor(Math.random() * fortunes.length);
            
            document.getElementById('fortune').innerHTML=fortunes[randomIndex];
            
        }
    </script>
</html>
