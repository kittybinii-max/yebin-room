<!DOCTYPE html>
    <html>
        <head>
            <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab&display=swap" rel="stylesheet">
            <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic&display=swap" rel="stylesheet">
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>예뿡이플리</title>
            <style>
                body {
                    background-color: rgb(254, 234, 238);
                    text-align:center;
                    font-family: 'Roboto Slab', serif;
                }
                .song-card {
                    width: 250px;
                    height: 330px;
                    background-size: cover;
                    background-position: center;
                    border-radius: 10px;
                    position: relative;
                    cursor: pointer;
                    display: flex;
                    flex-direction: column;
                    justify-content: flex-end;
                }
                .song-tile {
                    font-size: 16px;
                    font-family: 'Nanum Gothic', sans-serif;
                    font-weight: bold;
                }
                .song-artist {
                    font-size: 15px;
                    font-family: 'Nanum Gothic', sans-serif;
                }
                .description {
                    font-size: 13px;
                    font-family: 'Nanum Gothic', sans-serif;
                    color: gray;
                }
                .playlist {
                    display: flex;
                    justify-content: center;
                    gap: 90px;
                    flex-wrap: wrap;
                }
                #home-button {
                    font-size: 20px;
                    background-color: aliceblue;
                    border: 3px solid rgb(193, 227, 255);
                    padding: 7px 17px;
                    border-radius: 10px;
                    cursor: pointer;
                }
                </style>
                </head>
                <body>
                    <a href="index.html"><button id="home-button">🏠</button></a>
                    <br><br>
                    <h1> 🎧 playlist</h1>
                    <br><br>
                    <div class="playlist">
                        <div class="song-card" style="background-image: url('IMG_5909.JPG')">
                           <div style="margin-top: auto;">
                             <a href="https://www.youtube.com/watch?v=ACPODVhhACY" target="_blank">
                               <img src="https://img.youtube.com/vi/ACPODVhhACY/0.jpg" width="200">
                             </a>
                             <p class="song-tile">너란 봄</p>
                             <p class="song-artist">성한빈</p>
                             <br>
                             <p class="description">내게 찾아온 기적 같은 널</p>
                             <p class="description">사랑인가 봐</p>
                             </div>
                         </div>

                        <div class="song-card" style="background-image: url('IMG_5909.JPG')">
                             <div style="margin-top: auto;">
                             <a href="https://youtu.be/FWYUhTNf250?si=seNbdAMPQVgvt7tg" target="_blank">
                               <img src="https://img.youtube.com/vi/FWYUhTNf250/0.jpg" width="200">
                             </a>
                             <p class="song-tile">그건 사랑이었다고</p>
                             <p class="song-artist">YENA(최예나)</p>
                             <br>
                             <p class="description">너를 만난다면</p>
                             <p class="description">하고 싶었던 말</p>
                             </div>
                        </div>
                    </div>    

                </body>
    </html>
