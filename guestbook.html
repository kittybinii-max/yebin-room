<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>방명록</title>
        <style>
            body {
                background-color: aliceblue;
                text-align:center;
                font-family: 'Nanum Gothic', sans-serif;
            }

            .form-box{
                background-color: white;
                width: 80%;
                max-width: 300px;
                margin: 20px auto;
                padding: 30px;
                border-radius: 20px;
            }

            input, textarea, button {
                display: block;
                width: 100%;
                margin: 10px auto;
                padding: 10px;
                border-radius: 10px;
                border: 2px solid rgb(250, 214, 220);
                box-sizing: border-box;
            }

            button {
                background-color: rgb(250, 214, 220);
                color: black;
                border: none;
                cursor: pointer;
            }

            .card {
                background-image: url('IMG_6012.JPG');
                background-size: cover;
                width: 300px;
                margin: 10px auto;
                padding: 20px;
                border-radius: 10px;
                text-align: left;
            }
        </style>
    </head>
    
    <body>
        <h1>📝 방명록</h1>
        <div class="form-box">
            <input id="name" placeholder="이름!">
            <textarea id="message" placeholder="📝"></textarea>
            <br><br>
            <button onclick="addMessage()">남기기</button>
        </div>

        <div id="guestbook"></div>

       <script>
            function addMessage() {
                var name = document.getElementById('name').value;
                var message = document.getElementById('message').value;
                
                var card = document.createElement('div')
                card.className = 'card' ;
                card.innerHTML = '<b>' + name + '</b><p>' + message + '</p><button onclick="deleteMessage(this)">🗑️</button>';
                
                document.getElementById('guestbook').appendChild(card);
                
                var messages = JSON.parse(localStorage.getItem('messages') || '[]');
                var index = messages.length;
                card.setAttribute('data-index', index);
                messages.push({name: name, message: message});
                localStorage.setItem('messages', JSON.stringify(messages));
                alert ('작성 완료!') ;
            }
            function deleteMessage(button) {
                var password = prompt('비밀번호');
                if (password === '06131228') {
                    var card = button.parentElement;
                    var index = card.getAttribute('data-index');
                    var messages = JSON.parse(localStorage.getItem('messages') || '[]');
                    messages.splice(index, 1);
                    localStorage.setItem('messages', JSON.stringify(messages));
                    card.remove();
                } else {
                    alert('틀렸뜸ㅋㅋ');
                }
            }
            window.onload = function() {
                var messages = JSON.parse(localStorage.getItem('messages') || '[]');
                messages.forEach(function(m, index) {
                    var card = document.createElement('div');
                    card.className = 'card' ;
                    card.innerHTML = '<b>' + m.name + '</b><p>' + m.message + '</p><button onclick="deleteMessage(this)">🗑️</button>';
                    document.getElementById('guestbook').appendChild(card);
                });
            }
        </script>
    </body>
</html>
